 "e": "Decryption", "c": "セキュリティ・通信", "d": "暗号化したデータを、元に戻すこと。"}, {"t": "認証", "e": "Authentication", "c": "セキュリティ・通信", "d": "本人かどうかを確かめること。"}, {"t": "認可", "e": "Authorization", "c": "セキュリティ・通信", "d": "何をしてよいか、権限を与えること。"}, {"t": "パスワードハッシュ", "e": "Password Hashing", "c": "セキュリティ・通信", "d": "パスワードを、元に戻せない形にして保存する仕組み。"}, {"t": "認証トークン", "e": "Auth Token", "c": "セキュリティ・通信", "d": "ログイン状態などを証明する、文字列。"}, {"t": "OAuth", "e": "OAuth", "c": "セキュリティ・通信", "d": "他サービスのログインを使い、認証を任せる仕組み。"}, {"t": "JWT", "e": "JSON Web Token", "c": "セキュリティ・通信", "d": "情報を含んだ、認証用トークンの形式。"}, {"t": "SSL / TLS", "e": "SSL / TLS", "c": "セキュリティ・通信", "d": "通信を暗号化する仕組み。HTTPSの中身。"}, {"t": "ファイアウォール", "e": "Firewall", "c": "セキュリティ・通信", "d": "不正な通信を遮断する、防壁。"}, {"t": "SQLインジェクション", "e": "SQL Injection", "c": "セキュリティ・通信", "d": "不正なSQLを送り込み、DBを操作する攻撃。"}, {"t": "XSS", "e": "Cross-Site Scripting", "c": "セキュリティ・通信", "d": "悪意あるスクリプトを埋め込む、攻撃。"}, {"t": "CSRF", "e": "CSRF", "c": "セキュリティ・通信", "d": "利用者になりすまし、意図しない操作をさせる攻撃。"}, {"t": "脆弱性", "e": "Vulnerability", "c": "セキュリティ・通信", "d": "攻撃に使われ得る、弱点。"}, {"t": "二要素認証（2FA）", "e": "Two-Factor Auth", "c": "セキュリティ・通信", "d": "パスワードに加え、もう1段階で確認する仕組み。"}, {"t": "APIキー", "e": "API Key", "c": "セキュリティ・通信", "d": "APIを使うための鍵。識別・認証に使う。"}, {"t": "レート制限", "e": "Rate Limit", "c": "セキュリティ・通信", "d": "一定時間あたりの利用回数に、上限を設けること。"}, {"t": "プロキシ", "e": "Proxy", "c": "セキュリティ・通信", "d": "通信を中継する、サーバー。"}, {"t": "VPN", "e": "VPN", "c": "セキュリティ・通信", "d": "通信を暗号化してつなぐ、安全な仮想回線。"}, {"t": "DDoS攻撃", "e": "DDoS", "c": "セキュリティ・通信", "d": "大量アクセスで、サービスを停止させる攻撃。"}, {"t": "サニタイズ", "e": "Sanitize", "c": "セキュリティ・通信", "d": "入力値から、危険な要素を取り除くこと。"}, {"t": "ゼロトラスト", "e": "Zero Trust", "c": "セキュリティ・通信", "d": "何も無条件には信用せず、その都度検証する考え方。"}];

const TOTAL = DATA.length;
const CATS = ["すべて", ...Array.from(new Set(DATA.map(x=>x.c)))];

const qEl=document.getElementById('q'), clearEl=document.getElementById('clear'),
      chipsEl=document.getElementById('chips'), listEl=document.getElementById('list'),
      countEl=document.getElementById('count'), footEl=document.getElementById('foot');
let activeCat="すべて";

document.getElementById('whoName').textContent='by '+CONFIG.name;
document.getElementById('whoHandle').textContent='@'+CONFIG.handle;
document.getElementById('lineBtn').href=CONFIG.lineUrl;

CATS.forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip'+(cat==="すべて"?' active':'');
  b.textContent=cat; b.dataset.cat=cat;
  b.addEventListener('click',()=>{activeCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.cat===cat));render();});
  chipsEl.appendChild(b);
});

function esc(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function highlight(text,q){const safe=esc(text);if(!q)return safe;const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return safe.replace(re,'<mark>$1</mark>');}

function render(){
  const q=qEl.value.trim(), ql=q.toLowerCase();
  clearEl.classList.toggle('show',q.length>0);
  const rows=DATA.filter(x=>{
    if(activeCat!=="すべて"&&x.c!==activeCat)return false;
    if(!ql)return true;
    return x.t.toLowerCase().includes(ql)||x.e.toLowerCase().includes(ql)||x.d.toLowerCase().includes(ql)||x.c.toLowerCase().includes(ql);
  });
  countEl.innerHTML='全'+TOTAL+'語中 <b>'+rows.length+'</b> 件';
  if(rows.length===0){
    listEl.innerHTML='<div class="empty"><div class="big">「<span class="q">'+esc(q)+'</span>」に一致する用語は見つかりませんでした。</div><div>別のキーワードやジャンルを試してみてください。</div></div>';
    footEl.innerHTML=''; return;
  }
  listEl.innerHTML=rows.map(x=>'<article class="entry"><div class="entry-head"><span class="term">'+highlight(x.t,q)+'</span><span class="en">'+highlight(x.e,q)+'</span><span class="cat">'+esc(x.c)+'</span></div><p class="def">'+highlight(x.d,q)+'</p></article>').join('');
  footEl.innerHTML='AI &amp; DEV GLOSSARY · '+TOTAL+' TERMS<br><span class="fh">@'+CONFIG.handle+'</span>';
}

qEl.addEventListener('input',render);
qEl.addEventListener('keydown',e=>{if(e.key==='Escape'){qEl.value='';render();}});
clearEl.addEventListener('click',()=>{qEl.value='';qEl.focus();render();});

const toastEl=document.getElementById('toast');
let toastT;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1800);}
function copyLink(){
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>toast('リンクをコピーしました')).catch(()=>fallbackCopy(url));}
  else fallbackCopy(url);
}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('リンクをコピーしました');}catch(e){toast('コピーできませんでした');}document.body.removeChild(ta);}
document.getElementById('shareBtn').addEventListener('click',async()=>{
  const data={title:'AI・開発用語 検索ツール',text:CONFIG.shareText,url:location.href};
  if(navigator.share){try{await navigator.share(data);}catch(e){}}else{copyLink();}
});
document.getElementById('copyBtn').addEventListener('click',copyLink);

render();
</script>
